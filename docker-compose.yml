services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-n8n}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-n8npass}
      POSTGRES_DB: ${POSTGRES_DB:-n8n}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-n8n} -d ${POSTGRES_DB:-n8n} -h 127.0.0.1 || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  n8n:
    image: n8nio/n8n:latest
    ports:
      - "5678:5678"
    restart: unless-stopped
    environment:
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: ${POSTGRES_DB:-n8n}
      DB_POSTGRESDB_USER: ${POSTGRES_USER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD:-n8npass}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: ${N8N_PORT:-5678}
      N8N_PROTOCOL: ${N8N_PROTOCOL:-http}
      N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL:-http://localhost:5678}
      WEBHOOK_URL: ${WEBHOOK_URL:-http://localhost:5678}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY:-change-me}
      GENERIC_TIMEZONE: ${GENERIC_TIMEZONE:-UTC}
    depends_on:
      postgres:
        condition: service_healthy
    # Fallback for compose implementations that ignore depends_on conditions.
    command:
      - /bin/sh
      - -c
      - |
        node -e "
        const net = require('net');
        const host = process.env.DB_POSTGRESDB_HOST || 'postgres';
        const port = Number(process.env.DB_POSTGRESDB_PORT || 5432);
        const maxAttempts = 30;
        const delayMs = 2000;

        const wait = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

        (async () => {
          for (let attempt = 1; attempt <= maxAttempts; attempt += 1) {
            const ok = await new Promise((resolve) => {
              const socket = net.createConnection({ host, port });
              socket.once('connect', () => {
                socket.destroy();
                resolve(true);
              });
              socket.once('error', () => resolve(false));
              socket.setTimeout(2000, () => {
                socket.destroy();
                resolve(false);
              });
            });

            if (ok) {
              console.log(`Postgres reachable on ${host}:${port} (attempt ${attempt}).`);
              process.exit(0);
            }

            console.log(`Waiting for Postgres on ${host}:${port} (attempt ${attempt}/${maxAttempts})...`);
            await wait(delayMs);
          }

          console.error(`Postgres not reachable on ${host}:${port} after ${maxAttempts} attempts.`);
          process.exit(1);
        })();
        "
        && exec n8n start

volumes:
  postgres_data:
